<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Te invitaron a PropMatchRD</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap" id="contenido">
  <div class="loading"><div class="spinner"></div>Espera un momento…</div>
</div>

<script src="app.js"></script>
<script>
(async function () {
  const codigo = obtenerParametro('codigo') || obtenerParametro('ref');
  if (!codigo) { mostrarError('contenido', 'Falta el código de referido en el enlace.'); return; }

  try {
    const datos = await llamarApi({ ref: codigo });
    if (datos.error) { mostrarError('contenido', datos.mensaje); return; }

    const saludo = datos.nombreEmbajador ? datos.nombreEmbajador + ' te invitó a PropMatchRD' : 'Te invitaron a PropMatchRD';
    document.getElementById('contenido').innerHTML =
      '<div style="text-align:center;padding-top:40px">' +
      '<span class="eyebrow">Invitación personal</span>' +
      '<h1>' + saludo + '</h1>' +
      '<p>Te conectamos con un agente inmobiliario verificado en menos de 3 minutos. ¿Qué estás buscando?</p>' +
      '<div class="hero-btns" style="justify-content:center;margin-top:24px">' +
      (datos.linkFormularioComprador
        ? '<a class="btn btn-coral" href="' + datos.linkFormularioComprador + '">🏠 Quiero comprar</a>'
        : '') +
      (datos.linkFormularioAlquiler
        ? '<a class="btn btn-primary" href="' + datos.linkFormularioAlquiler + '">🔑 Busco alquiler</a>'
        : '') +
      '</div>' +
      (!datos.linkFormularioComprador && !datos.linkFormularioAlquiler
        ? '<p style="color:var(--coral)">Este enlace no está disponible en este momento.</p>'
        : '') +
      '</div>';
  } catch (err) {
    mostrarError('contenido', 'Ocurrió un problema de conexión. Intenta de nuevo en unos minutos.');
  }
})();
</script>
</body>
</html>
